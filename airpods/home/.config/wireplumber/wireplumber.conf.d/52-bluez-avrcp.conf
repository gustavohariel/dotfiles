# target: ~/.config/wireplumber/wireplumber.conf.d/52-bluez-avrcp.conf
# AirPods-specific bluez5 monitor properties.
#
#   dummy-avrcp-player    Expose a dummy MPRIS-backed AVRCP player so librepods
#                         (and AirPods' in-ear detection auto-pause) have a
#                         target to send transport commands to.
#   autoswitch-profile    Belt-and-suspenders: have WirePlumber auto-switch the
#                         bluez card to a2dp-sink when an output stream wants
#                         it. Defaults to true in PW 1.x but be explicit because
#                         AirPods reconnects sometimes land in `profile = off`
#                         and need a nudge. The airpods-watch script also forces
#                         a2dp-sink after connect for guaranteed correctness.
#
# Numbered 52- so it loads after 51-bluez.conf (from the bluetooth-fix bundle)
# without overlapping keys. Both files contribute to monitor.bluez.properties.
monitor.bluez.properties = {
  bluez5.dummy-avrcp-player = true
  bluez5.autoswitch-profile = true
}
