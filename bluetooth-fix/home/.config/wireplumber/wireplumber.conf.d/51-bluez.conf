# target: ~/.config/wireplumber/wireplumber.conf.d/51-bluez.conf
# Force WirePlumber to negotiate the best HFP codec (mSBC, 16 kHz wideband)
# and expose hardware volume / SBC-XQ for A2DP. Without this, Realtek dongles
# can silently fall back to CVSD (8 kHz narrowband) which sounds dramatically
# worse than wideband HFP.
monitor.bluez.properties = {
  bluez5.enable-msbc      = true
  bluez5.enable-sbc-xq    = true
  bluez5.enable-hw-volume = true
}
