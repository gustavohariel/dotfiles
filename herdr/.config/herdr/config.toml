onboarding = false

[theme]
name = "terminal"

[theme.custom]
# Titanium palette — inspired by OMP default dark theme
panel_bg = "#151820"
surface0 = "#151820"
surface1 = "#1f252d"
overlay0 = "#2a3038"
overlay1 = "#2a3038"
subtext0 = "#9ca3b0"
accent = "#00b4ff"
green = "#00ff88"
blue = "#0082b3"
red = "#ff4757"
yellow = "#ffb347"
[keys]
remove_worktree = "prefix+alt+d"
previous_workspace = "prefix+shift+left"
next_workspace = "prefix+shift+right"
switch_workspace = "prefix+shift+1..9"
previous_agent = "prefix+alt+p"
next_agent = "prefix+alt+n"
focus_agent = "prefix+alt+1..9"

[ui.sound]
enabled = true

[ui.toast]
delivery = "system"

[ui]
show_agent_labels_on_pane_borders = true
agent_panel_scope = "all"
prompt_new_tab_name = false

[worktrees]
directory = "~/.worktrees"
