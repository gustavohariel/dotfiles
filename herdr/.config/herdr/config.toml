onboarding = false

[theme]
name = "catppuccin"

[theme.custom]
# Titanium palette — Catppuccin only supplies sane UI token wiring; every
# visible color below is pinned back to the titanium palette.
panel_bg = "#151820"
surface0 = "#151820"
surface1 = "#27303a"
surface_dim = "#1f252d"
overlay0 = "#7f8a9b"
overlay1 = "#9aa6b8"
text = "#d7dde7"
subtext0 = "#c6ced8"
accent = "#00b4ff"
mauve = "#00b4ff"
green = "#00ff88"
blue = "#00b4ff"
teal = "#00d7d7"
red = "#ff4757"
yellow = "#ffb347"
peach = "#ffb347"
[keys]
remove_worktree = "prefix+alt+d"
previous_workspace = "prefix+shift+left"
next_workspace = "prefix+shift+right"
switch_workspace = "prefix+shift+1..9"
previous_agent = "prefix+alt+p"
next_agent = "prefix+alt+n"
focus_agent = "prefix+alt+1..9"

[[keys.command]]
key = "prefix+alt+g"
type = "pane"
command = "lazygit"
description = "lazygit"

[[keys.command]]
key = "prefix+alt+t"
type = "pane"
command = "btop"
description = "btop"

[[keys.command]]
key = "prefix+alt+b"
type = "shell"
command = "/home/realgh/.config/herdr/scripts/herdr-bun-start"
description = "bun start in new tab"

[[keys.command]]
key = "prefix+alt+e"
type = "pane"
command = "nvim"
description = "nvim"

[ui.sound]
enabled = true

[ui.toast]
delivery = "system"

[ui]
show_agent_labels_on_pane_borders = true
agent_panel_scope = "all"
prompt_new_tab_name = false

[worktrees]
directory = "~/.worktrees"

[experimental]
pane_history = true
switch_ascii_input_source_in_prefix = false

[update]
channel = "stable"
